name: 'build-test'
on:
    pull_request:
    push:
        branches:
            - main
            - 'releases/*'

jobs:
    build:
        name: 'Build'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - run: yarn
            - run: yarn all
    test:
        name: 'Test'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - id: version
              uses: ./
            - name: Install dependencies
              if: steps.version.outputs.is-new-version == 'true'
              env:
                  PUBLISHED_VERSION: ${{ steps.version.outputs.published-version }}
                  COMMITTED_VERSION: ${{ steps.version.outputs.committed-version }}
              run: |
                  echo "Latest published verison: $PUBLISHED_VERSION"
                  echo "Repo version: $COMMITTED_VERSION"
